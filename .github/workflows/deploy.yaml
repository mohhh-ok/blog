name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore OG image cache
        uses: actions/cache@v6
        with:
          path: .cache/og
          key: og-cache-${{ hashFiles('src/content/posts/**/*.md', 'src/content/posts/**/*.mdx') }}
          restore-keys: |
            og-cache-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          CI: "true"

      - name: Build
        run: bun run build
        env:
          CI: "true"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
