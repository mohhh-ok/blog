<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect x="0" y="0" width="880" height="540" rx="12" fill="#f2f0ee"/>

  <!-- タイトル -->
  <text x="32" y="46" font-size="22" font-weight="bold" fill="#19120f">Postgres + Drizzle + Embedding 意味検索の構成</text>

  <!-- フロー -->
  <!-- 入力 -->
  <rect x="20" y="90" width="170" height="90" rx="8" fill="#ffffff" stroke="#3b2922" stroke-width="2"/>
  <text x="105" y="126" font-size="14" font-weight="bold" fill="#19120f" text-anchor="middle">テキスト</text>
  <text x="105" y="152" font-size="12" fill="#3b2922" text-anchor="middle">検索クエリ / ドキュメント</text>

  <!-- 矢印1 -->
  <line x1="190" y1="135" x2="232" y2="135" stroke="#3b2922" stroke-width="2.5"/>
  <polygon points="240,135 228,129 228,141" fill="#3b2922"/>

  <!-- OpenAI -->
  <rect x="240" y="90" width="210" height="90" rx="8" fill="#bb5537"/>
  <text x="345" y="118" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">OpenAI API</text>
  <text x="345" y="142" font-size="12" fill="#ffffff" text-anchor="middle">text-embedding-3-small</text>
  <text x="345" y="164" font-size="12" fill="#ffffff" text-anchor="middle">1536次元ベクトル化</text>

  <!-- 矢印2 -->
  <line x1="450" y1="135" x2="492" y2="135" stroke="#3b2922" stroke-width="2.5"/>
  <polygon points="500,135 488,129 488,141" fill="#3b2922"/>

  <!-- Drizzle -->
  <rect x="500" y="90" width="160" height="90" rx="8" fill="#3b2922"/>
  <text x="580" y="124" font-size="14" font-weight="bold" fill="#f2f0ee" text-anchor="middle">Drizzle ORM</text>
  <text x="580" y="150" font-size="12" fill="#f2f0ee" text-anchor="middle">cosineDistance()</text>

  <!-- 矢印3 -->
  <line x1="660" y1="135" x2="702" y2="135" stroke="#3b2922" stroke-width="2.5"/>
  <polygon points="710,135 698,129 698,141" fill="#3b2922"/>

  <!-- Postgres -->
  <rect x="710" y="90" width="150" height="90" rx="8" fill="#8a000d"/>
  <text x="785" y="116" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Postgres</text>
  <text x="785" y="140" font-size="12" fill="#ffffff" text-anchor="middle">pgvector / HNSW</text>
  <text x="785" y="162" font-size="12" fill="#ffffff" text-anchor="middle">vector_cosine_ops</text>

  <!-- ターミナル -->
  <rect x="20" y="220" width="840" height="240" rx="8" fill="#19120f"/>
  <text x="44" y="256" font-size="14" fill="#f0b9a4" font-family="Menlo,'SF Mono',monospace">$ tsx src/main.ts 音楽</text>
  <text x="44" y="288" font-size="14" fill="#f0b9a4" font-family="Menlo,'SF Mono',monospace">1. ギターを担いだ男二人がバーで飲んでいる   distance: 0.690</text>
  <text x="44" y="318" font-size="14" fill="#f0b9a4" font-family="Menlo,'SF Mono',monospace">2. みかんを食べている男の人                 distance: 0.771</text>
  <text x="44" y="348" font-size="14" fill="#f0b9a4" font-family="Menlo,'SF Mono',monospace">3. レストランで食事する家族連れ             distance: 0.803</text>
  <text x="44" y="378" font-size="14" fill="#f0b9a4" font-family="Menlo,'SF Mono',monospace">4. 散歩をするおじいさん                     distance: 0.860</text>
  <text x="44" y="408" font-size="14" fill="#f0b9a4" font-family="Menlo,'SF Mono',monospace">5. 猫をなでる子供                           distance: 0.864</text>
  <text x="44" y="440" font-size="13" fill="#bb5537" font-family="Menlo,'SF Mono',monospace"># distanceが小さいほど意味が近い（閾値の目安 ~0.7）</text>

  <!-- フッター -->
  <text x="32" y="506" font-size="12" fill="#3b2922">コサイン距離による意味検索。「cat」→「猫をなでる子供」のように言語をまたいでもマッチする</text>
</svg>
