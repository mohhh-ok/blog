<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 430" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect x="0" y="0" width="880" height="430" rx="12" fill="#f2f0ee"/>

  <!-- タイトル -->
  <text x="32" y="46" font-size="22" font-weight="bold" fill="#19120f">ベクトル距離の計算手法と採用判断</text>

  <!-- コサイン カード -->
  <rect x="20" y="76" width="270" height="300" rx="8" fill="#ffffff" stroke="#bb5537" stroke-width="2.5"/>
  <rect x="20" y="76" width="270" height="42" rx="8" fill="#bb5537"/>
  <rect x="20" y="102" width="270" height="16" fill="#bb5537"/>
  <text x="155" y="104" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">コサイン — 採用</text>
  <!-- 角度の図 -->
  <line x1="80" y1="180" x2="180" y2="150" stroke="#bb5537" stroke-width="2.5"/>
  <line x1="80" y1="180" x2="190" y2="175" stroke="#bb5537" stroke-width="2.5"/>
  <path d="M 130 178 A 50 50 0 0 0 127 166" fill="none" stroke="#19120f" stroke-width="1.5"/>
  <text x="142" y="172" font-size="12" fill="#19120f">θ</text>
  <text x="36" y="226" font-size="13" fill="#19120f">・ベクトルの角度で比較</text>
  <text x="36" y="252" font-size="13" fill="#19120f">・値の範囲が限定され扱いやすい</text>
  <text x="36" y="278" font-size="13" fill="#19120f">・テキスト比較の定番</text>
  <text x="36" y="304" font-size="13" fill="#19120f">・HNSWインデックス対応</text>

  <!-- マンハッタン カード -->
  <rect x="305" y="76" width="270" height="300" rx="8" fill="#ffffff" stroke="#3b2922" stroke-width="2"/>
  <rect x="305" y="76" width="270" height="42" rx="8" fill="#3b2922"/>
  <rect x="305" y="102" width="270" height="16" fill="#3b2922"/>
  <text x="440" y="104" font-size="15" font-weight="bold" fill="#f2f0ee" text-anchor="middle">マンハッタン — 見送り</text>
  <!-- 格子経路の図 -->
  <polyline points="365,185 415,185 415,150 465,150" fill="none" stroke="#3b2922" stroke-width="2.5"/>
  <circle cx="365" cy="185" r="4" fill="#3b2922"/>
  <circle cx="465" cy="150" r="4" fill="#3b2922"/>
  <text x="321" y="226" font-size="13" fill="#19120f">・各次元の差の絶対値の合計</text>
  <text x="321" y="252" font-size="13" fill="#19120f">・明瞭な結果が得やすい</text>
  <text x="321" y="278" font-size="13" fill="#19120f">・値域が広く閾値計算にコスト</text>
  <text x="321" y="304" font-size="13" fill="#8a000d">・HNSW未対応（2025年5月時点）</text>

  <!-- ユークリッド カード -->
  <rect x="590" y="76" width="270" height="300" rx="8" fill="#ffffff" stroke="#8a000d" stroke-width="2"/>
  <rect x="590" y="76" width="270" height="42" rx="8" fill="#8a000d"/>
  <rect x="590" y="102" width="270" height="16" fill="#8a000d"/>
  <text x="725" y="104" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">ユークリッド — 不採用</text>
  <!-- 直線距離の図 -->
  <line x1="650" y1="185" x2="750" y2="150" stroke="#8a000d" stroke-width="2.5" stroke-dasharray="6 4"/>
  <circle cx="650" cy="185" r="4" fill="#8a000d"/>
  <circle cx="750" cy="150" r="4" fill="#8a000d"/>
  <text x="606" y="226" font-size="13" fill="#19120f">・単純な距離で比較</text>
  <text x="606" y="252" font-size="13" fill="#19120f">・文章全体の印象が反映される</text>
  <text x="606" y="278" font-size="13" fill="#8a000d">・外れ値が多い</text>
  <text x="606" y="304" font-size="13" fill="#8a000d">・意外な結果が返ってきやすい</text>

  <!-- フッター -->
  <text x="32" y="408" font-size="12" fill="#3b2922">テキストの意味検索ではコサインが定番。HNSWインデックス（vector_cosine_ops）と組み合わせて使用</text>
</svg>
