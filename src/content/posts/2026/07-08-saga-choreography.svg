<svg viewBox="0 0 640 260" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrChor" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b2922"/>
    </marker>
  </defs>
  <g font-size="12" fill="#19120f">
    <rect x="20"  y="40"  width="140" height="60" rx="6" fill="#fff" stroke="#3b2922"/>
    <text x="90"  y="70"  text-anchor="middle" font-weight="700">Order</text>
    <text x="90"  y="88"  text-anchor="middle" font-size="10" fill="#9f6073">OrderPlaced</text>

    <rect x="180" y="40"  width="140" height="60" rx="6" fill="#fff" stroke="#3b2922"/>
    <text x="250" y="70"  text-anchor="middle" font-weight="700">Inventory</text>
    <text x="250" y="88"  text-anchor="middle" font-size="10" fill="#9f6073">StockReserved</text>

    <rect x="340" y="40"  width="140" height="60" rx="6" fill="#fff" stroke="#3b2922"/>
    <text x="410" y="70"  text-anchor="middle" font-weight="700">Payment</text>
    <text x="410" y="88"  text-anchor="middle" font-size="10" fill="#9f6073">PaymentCaptured</text>

    <rect x="500" y="40"  width="120" height="60" rx="6" fill="#fff" stroke="#3b2922"/>
    <text x="560" y="70"  text-anchor="middle" font-weight="700">Shipping</text>
    <text x="560" y="88"  text-anchor="middle" font-size="10" fill="#9f6073">Dispatched</text>

    <line x1="160" y1="70" x2="180" y2="70" stroke="#3b2922" stroke-width="1.2" marker-end="url(#arrChor)"/>
    <line x1="320" y1="70" x2="340" y2="70" stroke="#3b2922" stroke-width="1.2" marker-end="url(#arrChor)"/>
    <line x1="480" y1="70" x2="500" y2="70" stroke="#3b2922" stroke-width="1.2" marker-end="url(#arrChor)"/>

    <text x="320" y="150" text-anchor="middle" font-size="11" fill="#9f6073" font-style="italic">
      各サービスが event を購読して次の event を発火。中央調整者なし。
    </text>

    <line x1="410" y1="200" x2="250" y2="200" stroke="#bb5537" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrChor)"/>
    <text x="330" y="192" text-anchor="middle" font-size="10" fill="#bb5537">PaymentFailed → 補償: StockRelease</text>
  </g>
</svg>
