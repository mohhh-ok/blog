<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="-apple-system, 'Helvetica Neue', sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; fill: #19120f; }
    .axis  { font-size: 14px; font-weight: 600; fill: #3b2922; }
    .lang  { font-size: 14px; font-weight: 600; fill: #3b2922; text-anchor: middle; }
    .model { font-size: 14px; font-weight: 600; fill: #19120f; text-anchor: end; }
    .val   { font-size: 13px; font-weight: 700; text-anchor: middle; }
    .val-dark  { fill: #fff5f0; }
    .val-light { fill: #19120f; }
    .legend-l  { font-size: 11px; fill: #3b2922; }
    .note      { font-size: 11px; fill: #6b5a52; }
  </style>

  <rect width="760" height="480" fill="#f2f0ee"/>

  <text x="30" y="34" class="title">7言語 × 4設定 CER（0.00 = 完全一致、低いほど良い）</text>

  <g transform="translate(170, 70)">
    <text x="40"  y="0" class="lang">ja</text>
    <text x="120" y="0" class="lang">en</text>
    <text x="200" y="0" class="lang">zh</text>
    <text x="280" y="0" class="lang">ko</text>
    <text x="360" y="0" class="lang">fr</text>
    <text x="440" y="0" class="lang">es</text>
    <text x="520" y="0" class="lang">de</text>
  </g>

  <g transform="translate(0, 95)">
    <text x="160" y="36" class="model">CosyVoice 2</text>
    <text x="160" y="96" class="model">CosyVoice 3</text>
    <text x="160" y="156" class="model">CosyVoice 3 + kana</text>
    <text x="160" y="216" class="model">Qwen3-TTS</text>
  </g>

  <g transform="translate(170, 95)">
    <!-- CosyVoice 2: ja 0.023 / en 0.000 / zh 0.000 / ko 0.024 / fr 0.324 / es 0.165 / de 0.875 -->
    <rect x="0"   y="0" width="80" height="60" fill="#d27b5f"/>
    <text x="40"  y="36" class="val val-dark">0.023</text>
    <rect x="80"  y="0" width="80" height="60" fill="#bb5537"/>
    <text x="120" y="36" class="val val-dark">0.000</text>
    <rect x="160" y="0" width="80" height="60" fill="#bb5537"/>
    <text x="200" y="36" class="val val-dark">0.000</text>
    <rect x="240" y="0" width="80" height="60" fill="#d27b5f"/>
    <text x="280" y="36" class="val val-dark">0.024</text>
    <rect x="320" y="0" width="80" height="60" fill="#9e7560"/>
    <text x="360" y="36" class="val val-dark">0.324</text>
    <rect x="400" y="0" width="80" height="60" fill="#c9a08a"/>
    <text x="440" y="36" class="val val-light">0.165</text>
    <rect x="480" y="0" width="80" height="60" fill="#3b2922"/>
    <text x="520" y="36" class="val val-dark">0.875</text>

    <!-- CosyVoice 3: ja 0.250 / en 0.000 / zh 0.000 / ko 0.024 / fr 0.000 / es 0.047 / de 0.125 -->
    <rect x="0"   y="60" width="80" height="60" fill="#9e7560"/>
    <text x="40"  y="96" class="val val-dark">0.250</text>
    <rect x="80"  y="60" width="80" height="60" fill="#bb5537"/>
    <text x="120" y="96" class="val val-dark">0.000</text>
    <rect x="160" y="60" width="80" height="60" fill="#bb5537"/>
    <text x="200" y="96" class="val val-dark">0.000</text>
    <rect x="240" y="60" width="80" height="60" fill="#d27b5f"/>
    <text x="280" y="96" class="val val-dark">0.024</text>
    <rect x="320" y="60" width="80" height="60" fill="#bb5537"/>
    <text x="360" y="96" class="val val-dark">0.000</text>
    <rect x="400" y="60" width="80" height="60" fill="#e0a48d"/>
    <text x="440" y="96" class="val val-light">0.047</text>
    <rect x="480" y="60" width="80" height="60" fill="#c9a08a"/>
    <text x="520" y="96" class="val val-light">0.125</text>

    <!-- CosyVoice 3 + kana 前処理: ja 0.045 only -->
    <rect x="0"   y="120" width="80" height="60" fill="#e0a48d"/>
    <text x="40"  y="156" class="val val-light">0.045</text>
    <rect x="80"  y="120" width="80" height="60" fill="#d9d4ce" stroke="#b8afa6" stroke-dasharray="3 3"/>
    <text x="120" y="156" class="val val-light">—</text>
    <rect x="160" y="120" width="80" height="60" fill="#d9d4ce" stroke="#b8afa6" stroke-dasharray="3 3"/>
    <text x="200" y="156" class="val val-light">—</text>
    <rect x="240" y="120" width="80" height="60" fill="#d9d4ce" stroke="#b8afa6" stroke-dasharray="3 3"/>
    <text x="280" y="156" class="val val-light">—</text>
    <rect x="320" y="120" width="80" height="60" fill="#d9d4ce" stroke="#b8afa6" stroke-dasharray="3 3"/>
    <text x="360" y="156" class="val val-light">—</text>
    <rect x="400" y="120" width="80" height="60" fill="#d9d4ce" stroke="#b8afa6" stroke-dasharray="3 3"/>
    <text x="440" y="156" class="val val-light">—</text>
    <rect x="480" y="120" width="80" height="60" fill="#d9d4ce" stroke="#b8afa6" stroke-dasharray="3 3"/>
    <text x="520" y="156" class="val val-light">—</text>

    <!-- Qwen3-TTS: ja 0.045 / en 0.000 / zh 0.200 / ko 0.024 / fr 0.000 / es 0.000 / de 0.000 -->
    <rect x="0"   y="180" width="80" height="60" fill="#e0a48d"/>
    <text x="40"  y="216" class="val val-light">0.045</text>
    <rect x="80"  y="180" width="80" height="60" fill="#bb5537"/>
    <text x="120" y="216" class="val val-dark">0.000</text>
    <rect x="160" y="180" width="80" height="60" fill="#9e7560"/>
    <text x="200" y="216" class="val val-dark">0.200</text>
    <rect x="240" y="180" width="80" height="60" fill="#d27b5f"/>
    <text x="280" y="216" class="val val-dark">0.024</text>
    <rect x="320" y="180" width="80" height="60" fill="#bb5537"/>
    <text x="360" y="216" class="val val-dark">0.000</text>
    <rect x="400" y="180" width="80" height="60" fill="#bb5537"/>
    <text x="440" y="216" class="val val-dark">0.000</text>
    <rect x="480" y="180" width="80" height="60" fill="#bb5537"/>
    <text x="520" y="216" class="val val-dark">0.000</text>
  </g>

  <g transform="translate(170, 380)">
    <text x="0" y="0" class="legend-l">CER 凡例</text>
    <rect x="80"  y="-12" width="36" height="16" fill="#bb5537"/>
    <text x="120" y="0" class="legend-l">0.00 完璧</text>
    <rect x="180" y="-12" width="36" height="16" fill="#d27b5f"/>
    <text x="220" y="0" class="legend-l">0.02 ElevenLabs 並</text>
    <rect x="320" y="-12" width="36" height="16" fill="#e0a48d"/>
    <text x="360" y="0" class="legend-l">0.05 実用品質</text>
    <rect x="450" y="-12" width="36" height="16" fill="#c9a08a"/>
    <text x="490" y="0" class="legend-l">0.10+ やや劣化</text>
    <rect x="80"  y="14" width="36" height="16" fill="#9e7560"/>
    <text x="120" y="26" class="legend-l">0.20+ 単語化け</text>
    <rect x="320" y="14" width="36" height="16" fill="#3b2922"/>
    <text x="360" y="26" class="legend-l">0.30+ 破綻</text>
  </g>

  <text x="170" y="448" class="note">— = CosyVoice 3 + kana 前処理は ja のみ検証 (CER 0.045 → CosyVoice 2 / Qwen3-TTS と実質同等)</text>
  <text x="170" y="464" class="note">Qwen3-TTS が 6/7 言語で CER ≤ 0.05、zh のみ要再検証</text>
</svg>
