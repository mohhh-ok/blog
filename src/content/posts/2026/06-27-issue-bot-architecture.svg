<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 260" font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Sans W3', 'Hiragino Sans', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#bb5537"/>
    </marker>
  </defs>

  <rect width="820" height="260" fill="#f2f0ee"/>

  <text x="410" y="42" font-size="20" font-weight="700" fill="#19120f" text-anchor="middle">issue-bot の流れ</text>

  <!-- Box 1: Issue -->
  <rect x="30" y="85" width="160" height="90" rx="8" fill="#3b2922"/>
  <text x="110" y="120" font-size="14" font-weight="700" fill="#f0b9a4" text-anchor="middle">Issue</text>
  <text x="110" y="148" font-size="11.5" fill="#f2f0ee" text-anchor="middle">起票 or /ai コメント</text>

  <path d="M 195 130 L 225 130" stroke="#bb5537" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Box 2: Actions -->
  <rect x="230" y="85" width="160" height="90" rx="8" fill="#bb5537"/>
  <text x="310" y="120" font-size="14" font-weight="700" fill="#f2f0ee" text-anchor="middle">GitHub Actions</text>
  <text x="310" y="148" font-size="11.5" fill="#f2f0ee" text-anchor="middle">フィルタと直列化</text>

  <path d="M 395 130 L 425 130" stroke="#bb5537" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Box 3: Claude -->
  <rect x="430" y="85" width="160" height="90" rx="8" fill="#19120f"/>
  <text x="510" y="120" font-size="14" font-weight="700" fill="#f0b9a4" text-anchor="middle">claude -p</text>
  <text x="510" y="148" font-size="11.5" fill="#f2f0ee" text-anchor="middle">Read / Glob / Grep</text>

  <path d="M 595 130 L 625 130" stroke="#bb5537" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Box 4: Reply -->
  <rect x="630" y="85" width="160" height="90" rx="8" fill="#3b2922"/>
  <text x="710" y="120" font-size="14" font-weight="700" fill="#f0b9a4" text-anchor="middle">Reply</text>
  <text x="710" y="148" font-size="11.5" fill="#f2f0ee" text-anchor="middle">gh issue comment</text>

  <!-- Footer -->
  <text x="410" y="220" font-size="12" fill="#3b2922" text-anchor="middle">最初に潰すのは 2 つだけ ——</text>
  <text x="410" y="240" font-size="13" font-weight="700" fill="#bb5537" text-anchor="middle">課金事故 (env スクラブ) ／ prompt injection (untrusted 扱い)</text>
</svg>
