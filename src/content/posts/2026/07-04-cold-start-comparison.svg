<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 15px; font-weight: 700; }
    .label { font-size: 13px; }
    .value { font-size: 13px; font-weight: 600; }
    .axis { font-size: 11px; fill: #666; }
    .gray { fill: #ddd; stroke: #999; stroke-width: 0.5; }
    .rp-warm { fill: #22c55e; }
    .rp-idle { fill: #ef4444; }
    .cr { fill: #3b82f6; }
  </style>

  <text x="450" y="30" text-anchor="middle" class="title">Cold start wall time (s) — RunPod Serverless vs Cloud Run GPU (24GB VRAM 級)</text>

  <!-- Legend -->
  <g transform="translate(140,50)">
    <rect x="0" y="0" width="14" height="14" class="rp-warm"/>
    <text x="20" y="12" class="label">RunPod FlashBoot 直後</text>
    <rect x="200" y="0" width="14" height="14" class="rp-idle"/>
    <text x="220" y="12" class="label">RunPod 20 min idle 後</text>
    <rect x="400" y="0" width="14" height="14" class="cr"/>
    <text x="420" y="12" class="label">Cloud Run 真 cold</text>
  </g>

  <!-- SDXL group -->
  <text x="450" y="105" text-anchor="middle" class="subtitle">SDXL Base 1.0 (~10GB VRAM)</text>

  <!-- x-axis for SDXL: scale 65s = 600px -->
  <!-- bar x-start: 250, x-end: 850 -->
  <g transform="translate(250,120)">
    <!-- gridlines -->
    <line x1="0" y1="0" x2="0" y2="120" stroke="#999" stroke-width="0.5"/>
    <line x1="184" y1="0" x2="184" y2="120" stroke="#eee"/>
    <line x1="369" y1="0" x2="369" y2="120" stroke="#eee"/>
    <line x1="554" y1="0" x2="554" y2="120" stroke="#eee"/>
    <text x="0" y="140" text-anchor="middle" class="axis">0</text>
    <text x="184" y="140" text-anchor="middle" class="axis">20s</text>
    <text x="369" y="140" text-anchor="middle" class="axis">40s</text>
    <text x="554" y="140" text-anchor="middle" class="axis">60s</text>
  </g>

  <text x="240" y="150" text-anchor="end" class="label">FlashBoot 直後</text>
  <rect x="250" y="135" width="120" height="22" class="rp-warm"/>
  <text x="378" y="152" class="value">12.97s</text>

  <text x="240" y="185" text-anchor="end" class="label">20 min idle</text>
  <rect x="250" y="170" width="568" height="22" class="rp-idle"/>
  <text x="826" y="187" class="value">61.47s</text>

  <text x="240" y="220" text-anchor="end" class="label">Cloud Run</text>
  <rect x="250" y="205" width="321" height="22" class="cr"/>
  <text x="579" y="222" class="value">34.78s</text>

  <!-- Divider -->
  <line x1="80" y1="290" x2="850" y2="290" stroke="#e5e7eb"/>

  <!-- Whisper group -->
  <text x="450" y="315" text-anchor="middle" class="subtitle">Whisper large-v3 (~3GB VRAM)</text>

  <g transform="translate(250,330)">
    <line x1="0" y1="0" x2="0" y2="120" stroke="#999" stroke-width="0.5"/>
    <line x1="184" y1="0" x2="184" y2="120" stroke="#eee"/>
    <line x1="369" y1="0" x2="369" y2="120" stroke="#eee"/>
    <line x1="554" y1="0" x2="554" y2="120" stroke="#eee"/>
    <text x="0" y="140" text-anchor="middle" class="axis">0</text>
    <text x="184" y="140" text-anchor="middle" class="axis">20s</text>
    <text x="369" y="140" text-anchor="middle" class="axis">40s</text>
    <text x="554" y="140" text-anchor="middle" class="axis">60s</text>
  </g>

  <text x="240" y="360" text-anchor="end" class="label">FlashBoot 直後</text>
  <rect x="250" y="345" width="23" height="22" class="rp-warm"/>
  <text x="281" y="362" class="value">2.49s</text>

  <text x="240" y="395" text-anchor="end" class="label">20 min idle</text>
  <rect x="250" y="380" width="44" height="22" class="rp-idle"/>
  <text x="302" y="397" class="value">4.72s</text>

  <text x="240" y="430" text-anchor="end" class="label">Cloud Run</text>
  <rect x="250" y="415" width="155" height="22" class="cr"/>
  <text x="413" y="432" class="value">16.79s</text>
</svg>
