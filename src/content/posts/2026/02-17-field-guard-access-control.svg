<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" font-family="sans-serif">
  <rect width="880" height="500" fill="#f2f0ee"/>
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#19120f">field-guard ― 誰が・どのフィールドを見れるかを型安全に評価</text>

  <!-- 入力: Ctx -->
  <rect x="50" y="90" width="220" height="100" rx="10" fill="#ffffff" stroke="#3b2922" stroke-width="2"/>
  <text x="160" y="120" text-anchor="middle" font-size="15" font-weight="bold" fill="#3b2922">Ctx（誰が）</text>
  <text x="160" y="150" text-anchor="middle" font-size="13" font-family="monospace" fill="#19120f">userId: "1"</text>
  <text x="160" y="172" text-anchor="middle" font-size="13" font-family="monospace" fill="#19120f">role: "user"</text>

  <!-- 入力: Target -->
  <rect x="50" y="230" width="220" height="100" rx="10" fill="#ffffff" stroke="#3b2922" stroke-width="2"/>
  <text x="160" y="260" text-anchor="middle" font-size="15" font-weight="bold" fill="#3b2922">Target（何を）</text>
  <text x="160" y="290" text-anchor="middle" font-size="13" font-family="monospace" fill="#19120f">{ id, email, name }</text>
  <text x="160" y="312" text-anchor="middle" font-size="12" fill="#3b2922">他人のプロフィール</text>

  <!-- 矢印 -->
  <path d="M270 140 L330 195" stroke="#19120f" stroke-width="2.5" fill="none"/>
  <path d="M320 193 L332 197 L324 187" fill="#19120f"/>
  <path d="M270 280 L330 225" stroke="#19120f" stroke-width="2.5" fill="none"/>
  <path d="M324 233 L332 223 L320 227" fill="#19120f"/>

  <!-- Guard -->
  <rect x="335" y="120" width="240" height="180" rx="10" fill="#bb5537"/>
  <text x="455" y="152" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">Guard.check()</text>
  <rect x="355" y="170" width="200" height="110" rx="6" fill="#19120f"/>
  <text x="370" y="198" font-size="12" font-family="monospace" fill="#f0b9a4">policy: {</text>
  <text x="384" y="220" font-size="12" font-family="monospace" fill="#f0b9a4">owner: true,</text>
  <text x="384" y="242" font-size="12" font-family="monospace" fill="#f0b9a4">other: {id, name}</text>
  <text x="370" y="264" font-size="12" font-family="monospace" fill="#f0b9a4">}</text>

  <!-- 矢印 -->
  <path d="M575 210 L635 210" stroke="#19120f" stroke-width="2.5" fill="none"/>
  <path d="M627 204 L637 210 L627 216" fill="none" stroke="#19120f" stroke-width="2.5"/>
  <text x="605" y="195" text-anchor="middle" font-size="12" fill="#3b2922">判定</text>

  <!-- Verdict -->
  <rect x="645" y="140" width="190" height="140" rx="10" fill="#3b2922"/>
  <text x="740" y="172" text-anchor="middle" font-size="15" font-weight="bold" fill="#f2f0ee">FieldVerdict</text>
  <text x="740" y="205" text-anchor="middle" font-size="12" font-family="monospace" fill="#f0b9a4">allowedFields:</text>
  <text x="740" y="228" text-anchor="middle" font-size="13" font-family="monospace" fill="#f0b9a4">["id", "name"]</text>
  <text x="740" y="260" text-anchor="middle" font-size="12" fill="#f2f0ee">email は不許可</text>

  <!-- 下段: フィルタリング結果 -->
  <path d="M740 280 L740 340 L490 340 L490 370" stroke="#19120f" stroke-width="2.5" fill="none"/>
  <path d="M484 362 L490 372 L496 362" fill="none" stroke="#19120f" stroke-width="2.5"/>
  <text x="640" y="332" text-anchor="middle" font-size="13" fill="#19120f">verdictでAPIレスポンスをフィルタリング</text>

  <rect x="200" y="380" width="580" height="85" rx="10" fill="#ffffff" stroke="#bb5537" stroke-width="2"/>
  <text x="490" y="412" text-anchor="middle" font-size="14" font-weight="bold" fill="#bb5537">返却されるレスポンス</text>
  <text x="490" y="442" text-anchor="middle" font-size="14" font-family="monospace" fill="#19120f">{ id: "2", name: "Other" }  // email は含まれない</text>
</svg>
