<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect x="0" y="0" width="880" height="480" rx="12" fill="#f2f0ee"/>

  <!-- タイトル -->
  <text x="32" y="46" font-size="22" font-weight="bold" fill="#19120f">GitLeaks から BetterLeaks へ（同一作者の後継ツール）</text>

  <!-- 検出率バー -->
  <text x="32" y="92" font-size="15" font-weight="bold" fill="#19120f">検出率（Recall）</text>

  <text x="180" y="130" font-size="14" fill="#19120f" text-anchor="end">GitLeaks</text>
  <rect x="196" y="112" width="394" height="30" rx="4" fill="#3b2922"/>
  <text x="600" y="133" font-size="14" font-weight="bold" fill="#19120f">約 70.4%</text>

  <text x="180" y="178" font-size="14" font-weight="bold" fill="#19120f" text-anchor="end">BetterLeaks</text>
  <rect x="196" y="160" width="552" height="30" rx="4" fill="#bb5537"/>
  <text x="758" y="181" font-size="14" font-weight="bold" fill="#bb5537">約 98.6%</text>

  <!-- 比較カード -->
  <rect x="20" y="230" width="410" height="190" rx="8" fill="#ffffff" stroke="#3b2922" stroke-width="2"/>
  <rect x="20" y="230" width="410" height="40" rx="8" fill="#3b2922"/>
  <rect x="20" y="254" width="410" height="16" fill="#3b2922"/>
  <text x="225" y="256" font-size="15" font-weight="bold" fill="#f2f0ee" text-anchor="middle">GitLeaks（2018年〜）</text>
  <text x="40" y="300" font-size="13" fill="#19120f">・Shannon entropy + 正規表現で検出</text>
  <text x="40" y="328" font-size="13" fill="#19120f">・Go製（CGO依存）</text>
  <text x="40" y="356" font-size="13" fill="#19120f">・エンコード済みシークレットは限定対応</text>
  <text x="40" y="384" font-size="13" fill="#19120f">・基本的なパターンマッチング</text>

  <rect x="450" y="230" width="410" height="190" rx="8" fill="#ffffff" stroke="#bb5537" stroke-width="2.5"/>
  <rect x="450" y="230" width="410" height="40" rx="8" fill="#bb5537"/>
  <rect x="450" y="254" width="410" height="16" fill="#bb5537"/>
  <text x="655" y="256" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">BetterLeaks（2026年2月〜）</text>
  <text x="470" y="300" font-size="13" fill="#19120f">・BPEトークナイゼーション（cl100k_base）</text>
  <text x="470" y="328" font-size="13" fill="#19120f">・Pure Go（CGO不要）・並列gitスキャン</text>
  <text x="470" y="356" font-size="13" fill="#19120f">・Base64等のエンコードをネイティブ対応</text>
  <text x="470" y="384" font-size="13" fill="#19120f">・CELバリデーション + HTTP検証</text>

  <!-- フッター -->
  <text x="32" y="454" font-size="13" font-weight="bold" fill="#bb5537">GitLeaksからのドロップインリプレースメント — 設定ファイルはほぼそのまま移行できる</text>
</svg>
