<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" font-family="sans-serif">
  <rect width="880" height="560" fill="#f2f0ee"/>
  <text x="440" y="40" text-anchor="middle" font-size="21" font-weight="bold" fill="#19120f">1tickの流れ ― LLMは「判断」、エンジンは「計算」</text>

  <!-- ワーカー -->
  <rect x="310" y="65" width="260" height="56" rx="10" fill="#19120f"/>
  <text x="440" y="89" text-anchor="middle" font-size="15" font-weight="bold" fill="#f0b9a4">自走ワーカー</text>
  <text x="440" y="110" text-anchor="middle" font-size="12" fill="#f0b9a4">2時間ごとに世界を1日進める</text>

  <path d="M440 121 L440 150" stroke="#19120f" stroke-width="2.5" fill="none"/>
  <path d="M434 142 L440 152 L446 142" fill="none" stroke="#19120f" stroke-width="2.5"/>

  <!-- tick処理: 2カラム -->
  <rect x="70" y="160" width="350" height="150" rx="10" fill="#bb5537"/>
  <text x="245" y="190" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">LLM（判断）</text>
  <text x="245" y="218" text-anchor="middle" font-size="13" fill="#ffffff">claude -p --output-format json</text>
  <text x="245" y="248" text-anchor="middle" font-size="13" fill="#ffffff">行動選択・台詞・日記</text>
  <text x="245" y="272" text-anchor="middle" font-size="13" fill="#ffffff">関係性のラベル</text>

  <rect x="460" y="160" width="350" height="150" rx="10" fill="#3b2922"/>
  <text x="635" y="190" text-anchor="middle" font-size="16" font-weight="bold" fill="#f2f0ee">TypeScriptエンジン（計算）</text>
  <text x="635" y="218" text-anchor="middle" font-size="13" fill="#f2f0ee">決定論的に数値を保証</text>
  <text x="635" y="248" text-anchor="middle" font-size="13" fill="#f2f0ee">資源・霊力バランス・日次負荷</text>
  <text x="635" y="272" text-anchor="middle" font-size="13" fill="#f2f0ee">クランプ・死判定・ステージ遷移</text>

  <!-- バリデーション -->
  <path d="M245 310 L245 345" stroke="#19120f" stroke-width="2.5" fill="none"/>
  <path d="M239 337 L245 347 L251 337" fill="none" stroke="#19120f" stroke-width="2.5"/>
  <path d="M635 310 L635 345" stroke="#19120f" stroke-width="2.5" fill="none"/>
  <path d="M629 337 L635 347 L641 337" fill="none" stroke="#19120f" stroke-width="2.5"/>

  <rect x="70" y="355" width="350" height="74" rx="10" fill="#ffffff" stroke="#bb5537" stroke-width="2"/>
  <text x="245" y="385" text-anchor="middle" font-size="14" font-weight="bold" fill="#bb5537">バリデーション（デフォルト化）</text>
  <text x="245" y="410" text-anchor="middle" font-size="12" fill="#3b2922">不正なJSON・行動は食糧採集に置換 + warnログ</text>

  <rect x="460" y="355" width="350" height="74" rx="10" fill="#ffffff" stroke="#3b2922" stroke-width="2"/>
  <text x="635" y="385" text-anchor="middle" font-size="14" font-weight="bold" fill="#3b2922">確定した1日</text>
  <text x="635" y="410" text-anchor="middle" font-size="12" fill="#3b2922">LLMが暴れても世界の数値は壊れない</text>

  <path d="M420 392 L455 392" stroke="#19120f" stroke-width="2.5" fill="none"/>
  <path d="M447 386 L457 392 L447 398" fill="none" stroke="#19120f" stroke-width="2.5"/>

  <!-- DB保存 -->
  <path d="M635 429 L635 460" stroke="#19120f" stroke-width="2.5" fill="none"/>
  <path d="M629 452 L635 462 L641 452" fill="none" stroke="#19120f" stroke-width="2.5"/>

  <rect x="460" y="470" width="350" height="60" rx="10" fill="#19120f"/>
  <text x="635" y="496" text-anchor="middle" font-size="14" font-weight="bold" fill="#f0b9a4">SQLiteに保存（スナップショット）</text>
  <text x="635" y="518" text-anchor="middle" font-size="12" fill="#f0b9a4">fin で world.finished = true → ワーカー永久停止</text>

  <!-- ロールバック経路 -->
  <path d="M70 392 L40 392 L40 516 L455 516" stroke="#8a000d" stroke-width="2.5" fill="none" stroke-dasharray="7 5"/>
  <path d="M447 510 L457 516 L447 522" fill="none" stroke="#8a000d" stroke-width="2.5"/>
  <text x="58" y="458" font-size="12" font-weight="bold" fill="#8a000d">使用上限エラー時:</text>
  <text x="58" y="478" font-size="12" fill="#8a000d">保存せず最終スナップショットへ</text>
  <text x="58" y="496" font-size="12" fill="#8a000d">巻き戻し、同じ日をやり直す</text>
</svg>
